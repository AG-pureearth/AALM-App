name: Publish Docker image

# Builds the app (Dockerfile.wine) once, in the cloud, and publishes a ready-to-run
# image to the GitHub Container Registry so users can pull it instead of building it.
# Runs on every push to main; can also be triggered manually.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest          # x86-64 runner — required for the Wine engine
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.wine
          push: true
          tags: ghcr.io/ag-pureearth/aalm-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
